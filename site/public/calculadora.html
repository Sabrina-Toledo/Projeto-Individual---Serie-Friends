<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/style_calculadora.css">
    <title>Site Interativo - Friends</title>
</head>

<body>

    <h1>Descubra quanto tempo você levaria para terminar Friends!</h1><br>

    <p>
        São 236 episódios e 10 temporadas de comédia, amizade e caos em Nova York.
    </p><br>


    Digite quanto tempo livre você tem por dia para assistir episódios:
    <input type="text" id="input_hora" placeholder="Ex. 2 horas">
    <select name="" id="select_tipo">
        <option value="horas">horas</option>
        <option value="minutos">minutos</option>
    </select><br>
    <small>Cada episódio tem aproximadamente entre 20 e 23 minutos.</small><br><br>

    <div id="div_msg"></div><br>

    <button onclick="calcular()">Calcular</button>
</body>

</html>

<script>

    function calcular() {

        let hora = Number(input_hora.value)

        let tipo = select_tipo.value

        let mensagem = ''

        // Dados da série
        let episodio = 23
        let qtdEpisodio = 236

        // Tempo total da série em minutos
        let totalMinSerie = qtdEpisodio * episodio

        // Validação
        if (hora <= 0 || isNaN(hora)) {

            alert('Preencha o campo corretamente!')

        } else {

            let friendsMinuto

            // Converte horas para minutos
            if (tipo == 'horas') {

                friendsMinuto = hora * 60

            } else {

                friendsMinuto = hora
            }

            // Quanto tempo levaria
            let totalDias = totalMinSerie / friendsMinuto

            let totalMes = totalDias / 30

            // Porcentagem da série assistida por dia
            let porcentagemSerie = (friendsMinuto / totalMinSerie) * 100

            // Quantos episódios por dia
            let episodiosPorDia = friendsMinuto / episodio

            // Porcentagem do dia ocupado
            let porcentagemDia = (friendsMinuto / 1440) * 100

            if (totalDias <= 1) {

                mensagem += `
                <b>Você maratonaria Friends em menos de 1 dia!</b>
                <br><br>
                `

            } else {

                mensagem = `
                Você levaria aproximadamente 
                <b>${totalDias.toFixed(0)}</b> dias
                ou
                <b>${totalMes.toFixed(1)}</b> meses
                para terminar Friends.
                <br><br>
                `
            }

            mensagem += `
            Assistindo <b>${hora} ${tipo}</b> por dia:
            <br><br>

            • Você veria aproximadamente 
            <b>${episodiosPorDia.toFixed(1)}</b> episódios por dia.
            <br><br>

            • Isso representa cerca de 
            <b>${porcentagemSerie.toFixed(2)}%</b>
            da série por dia.
            <br><br>

            • O tempo assistindo ocuparia aproximadamente 
            <b>${porcentagemDia.toFixed(1)}%</b>
            do seu dia.
            `

            div_msg.innerHTML = mensagem
        }
    }

</script>
