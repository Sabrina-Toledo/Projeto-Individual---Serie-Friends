<script>

    function mostrarPergunta(index) {
        let quiz = document.getElementById('quiz-dinamico')

        if (index >= listaDeQuestoes.length) {
            quiz.style.display = 'none';
            calcularResultado(); // chamar calcular resultado
            return;
        }

        quiz.innerHTML = `
      <div class= "pergunta-conteiner">
        <p>${questaoAtual.pergunta}</p>
      <div class = "opcoes">

        <li>

            </label>
        </li>

            </label>
        </li>

            </label>

            </label>
        </li>

    function proximaPergunta() {

        let questoes = {
            opcaoA: document.getElementById('optA'),
            opcaoB: document.getElementById('optB'),
            opcaoC: document.getElementById('optC'),
            opcaoD: document.getElementById('optD'),
            opcaoE: document.getElementById('optE'),
            opcaoF: document.getElementById('optF')
        }

        if (questoes.opcaoA.checked) { // .checked para saber qual foi MARCADA
            respostasUsuario.push('A')
        } else if (questoes.opcaoB.checked) {
            respostasUsuario.push('B')
        } else if (questoes.opcaoC.checked) {
            respostasUsuario.push('C')
        } else if (questoes.opcaoD.checked) {
            respostasUsuario.push('D')
        } else if (questoes.opcaoE.checked) {
            respostasUsuario.push('E')
        } else if (questoes.opcaoF.checked) {
            respostasUsuario.push('F')
        } else {
            alert('Por favor, selecione um opção antes de avançar!')
            return;
        }

        indiceAtual++; // quantidade de perguntas 
        mostrarPergunta(indiceAtual)
    }

    function calcularResultado() {

        let pontos = {
            pontosA: 0,
            pontosB: 0,
            pontosC: 0,
            pontosD: 0,
            pontosE: 0,
            pontosF: 0

                pontos.pontosA++;
            } else if (respostaAtual == 'B') {
                pontos.pontosB++;
            } else if (respostaAtual == 'C') {
                pontos.pontosC++;
            } else if (respostaAtual == 'D') {
                pontos.pontosD++;
            } else if (respostaAtual == 'E') {
                pontos.pontosE++;
            } else if (respostaAtual == 'F') {
                pontos.pontosF++;
            }
        }

        let textoFinal = '';

            pontos.pontosA >= pontos.pontosB &&
            pontos.pontosA >= pontos.pontosC &&
            pontos.pontosA >= pontos.pontosD &&
            pontos.pontosA >= pontos.pontosE &&
            pontos.pontosA >= pontos.pontosF) {
            personagem = 'Personagem A'

            pontos.pontosB >= pontos.pontosC &&
            pontos.pontosB >= pontos.pontosD &&
            pontos.pontosB >= pontos.pontosE &&
            pontos.pontosB >= pontos.pontosF) {
            personagem = 'Personagem B'

        } else if (
            pontos.pontosC >= pontos.pontosD &&
            pontos.pontosC >= pontos.pontosE &&
            pontos.pontosC >= pontos.pontosF) {
            personagem = 'Personagem C'

        } else if (
            pontos.pontosD >= pontos.pontosE &&
            pontos.pontosD >= pontos.pontosF) {
            personagem = 'Personagem D'

        } else if (

            personagem = 'Personagem E'

        } else {
            personagem = 'Personagem F'
        }

        let rossPersonalidade = `Personalidade: Você sente tudo de maneira intensa. Sua mente racional tenta organizar o mundo, mas suas emoções frequentemente falam mais alto. Existe uma necessidade constante de compreender as pessoas, os sentimentos e os acontecimentos ao seu redor, o que faz de você alguém profundamente reflexivo. Apesar da rigidez ocasional, você ama com sinceridade e entrega, carregando uma visão quase idealista sobre relacionamentos e família.`

        let chandlerHistoria = ` História: Chandler passou anos em um emprego que odiava e fugindo de compromissos devido a traumas familiares. Sua jornada é sobre superação: ele aprendeu a se abrir para o amor real e teve a coragem de recomeçar do zero na publicidade para encontrar propósito.`

        let phoebePersonalidade = `Personalidade: Você enxerga o mundo de maneira única, quase impossível de ser limitada pelas regras comuns. Sua autenticidade vem de alguém que aprendeu a sobreviver sem depender da validação dos outros. Existe uma força silenciosa em você: mesmo depois de experiências difíceis, escolhe preservar a leveza, a criatividade e a capacidade de acreditar no extraordinário. Sua liberdade emocional inspira quem está ao seu redor.`
        let phoebeHistoria = `História: Phoebe mesmo com um passado difícil e uma infância de rua, escolheu não ser uma vítima das circunstâncias. Ela criou sua própria realidade, transformando suas tragédias em músicas excêntricas e mantendo uma pureza que ninguém consegue corromper.`

        let monicaPersonalidade = ` Personalidade: Você demonstra amor através do cuidado, da organização e da dedicação intensa às pessoas importantes para você. Existe uma necessidade profunda de sentir controle sobre a própria vida, muitas vezes como resposta a inseguranças antigas. Competitiva e determinada, você coloca o coração em tudo o que faz. Embora tente parecer forte o tempo inteiro, no fundo busca reconhecimento, pertencimento e a sensação de ser suficiente.`
        let monicaHistoria = ` História: Monica transformou suas inseguranças da juventude em uma força motriz para se tornar uma chef de sucesso. Ela é a "cola" do grupo, provando que ser a anfitriã e ditar as regras é, na verdade, a sua forma mais pura de demonstrar amor e proteção pelos amigos.`

        let joeyPersonalidade = ` Personalidade: Você possui uma bondade genuína e uma forma simples, porém profunda, de enxergar a vida. Valoriza a lealdade acima de qualquer status e prefere relações sinceras a jogos emocionais. Seu jeito leve esconde uma enorme capacidade de proteger e apoiar quem ama. Mesmo quando o mundo parece exigir malícia ou egoísmo, você continua acreditando nas pessoas e vivendo com autenticidade.`
        let joeyHistoria = ` História: Joey lutou anos como um ator de pequenas peças até conseguir seu papel em Days of Our Lives. Sua história mostra que o sucesso não o mudou: ele continua sendo o amigo que coloca a felicidade do grupo acima de qualquer ambição pessoal ou profissional.`


        if (personagem === "Personagem A") {
            textoFinal = `
            <p class="personagemFinal">A maioria das respostas foram A! Que significa que você se parece com a Rachel</p>
            <p class="personalidade"> ${rachelPersonalidade}</p>
            <p class="historia">${rachelHistoria}</p>
            `
        } else if (personagem === "Personagem B") {

        } else if (personagem === "Personagem D") {
            textoFinal = `

            <p class="personalidade">${phoebePersonalidade}</p>
            <p class="historia">${phoebeHistoria}</p>
            `
        } else if (personagem === "Personagem E") {
            textoFinal = `
            <p class="personagemFinal">A maioria das respostas foram E! Que significa que você se parece com a  Monica</p>
            <p class="personalidade">${monicaPersonalidade}</p>
            <p class="historia">${monicaHistoria}</p>
            `

    console.log(sessionStorage.ID_USUARIO);

    function enviaParaBanco(personagem) {
        var idUsuarioVar = sessionStorage.ID_USUARIO;

        let dadosSalvar = {
            idUsuario: sessionStorage.ID_USUARIO,
            respostas: respostasUsuario,
            resultadoQuiz: personagem,
        };

        fetch("/quiz/salvar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(dadosSalvar)
        })
            .then(function (resposta) {
                if (resposta.ok) {
                    console.log("Dados salvos no banco com sucesso!");

                    resposta.json().then(json => {
                        console.log(json);
                    })

                } else {
                    console.error("Error ao tentar salvar os dados.");

                    resposta.json().then(json => {
                        console.log(json);
                    })
                }
            })
            .catch(function (error) {
                console.log("Error de rede ao conectar com o servidor:", error);
            });
    }

    function reiniciarQuiz() {
        respostasUsuario = []
        indiceAtual = 0;

        document.getElementById('resultado-container').style.display = 'none'
        document.getElementById('quiz-dinamico').style.display = 'block';

        mostrarPergunta(indiceAtual);
